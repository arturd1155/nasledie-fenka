<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеобиблиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <header class="site-header">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between py-3">
                <div class="logo">
                    <span class="logo-text">ВИДЕО<span class="logo-accent">БИБЛИОТЕКА</span></span>
                </div>
                <div class="search-wrap">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" placeholder="Поиск видео...">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container-fluid px-4">
            <h1 class="hero-title">Откройте для себя <span class="gradient-text">историю</span></h1>
            <p class="hero-subtitle">Документальные видео о людях и событиях, изменивших мир</p>
        </div>
    </section>

    <section class="category-nav">
        <div class="container-fluid px-4">
            <div class="category-tabs">
                <button class="cat-btn active" data-category="all">Все видео</button>
                <button class="cat-btn" data-category="evrei">Евреи изменившие мир</button>
                <button class="cat-btn" data-category="istorii">Истории, которые изменили мир</button>
            </div>
            <div class="season-tabs" id="seasonTabs">
                <button class="season-btn active" data-season="all">Все сезоны</button>
                <button class="season-btn" data-season="1">1 сезон. Моисей</button>
            </div>
        </div>
    </section>

    <main class="video-section">
        <div class="container-fluid px-4">
            <div class="section-label" id="sectionLabel">Все видео</div>
            <div class="row g-4" id="videoGrid"></div>
            <div class="no-results" id="noResults" style="display:none;">
                <i class="bi bi-camera-video-off"></i>
                <p>Видео не найдены</p>
            </div>
        </div>
    </main>

    <div class="video-modal" id="videoModal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
            <div class="modal-video-wrap">
                <video id="modalVideo" controls>
                    <source id="modalVideoSrc" src="" type="video/mp4">
                </video>
            </div>
            <div class="modal-info">
                <h3 id="modalTitle"></h3>
                <p id="modalDescription"></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container-fluid px-4">
            <p>© 2026 Видеобиблиотека</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/videos.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
